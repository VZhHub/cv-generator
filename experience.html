		<meta charset="utf-8">

		<title>CVGen - Experience</title>

		<link rel="stylesheet" type="text/css" href="./css/reset.css">
		<link rel="stylesheet" type="text/css" href="./css/base.css">
		<link rel="stylesheet" type="text/css" href="./css/layout.css">
		<link rel="stylesheet" type="text/css" href="./css/utils.css">
		<link rel="stylesheet" type="text/css" href="./css/typography.css">
		<link rel="stylesheet" type="text/css" href="./css/components/form.css">
		<link rel="stylesheet" type="text/css" href="./css/components/process-button.css">
		<link rel="stylesheet" type="text/css" href="./css/components/page-backdrop.css">
	</head>
	<body>
		<div class="page-backdrop"></div>
		<header class="page-header">
			<a href="./index.html"><img src="./assets/images/logo.svg" width="90" height="25" alt="CVgenerator"></a>
			<nav>
				<ul>
					<li><a href="#my-contact">Contact</a></li>
				</ul>
			</nav>
		</header>
		<main class="page-main">
			<header class="main-header">
				<hgroup class="main-header__hgroup">
					<h1>My experiences</h1>
					<p><em>This section is optional but highly recommended.</em></p>
				</hgroup>
			</header>
			<form action="">
				<fieldset class="fieldset fieldset--education">
					<legend>Education</legend>
					<div class="input-group input-group--school">
						<label for="school">School</label><br>
						<input id="school" name="school" type="text">
					</div>
					<div class="input-group input-group--degree">
						<label for="degree">Degree</label><br>
						<input id="degree" name="degree" type="text">
					</div>
					<div class="input-group">
						<label for="studystart">Start date</label><br>
						<input id="studystart" name="studystart" type="date">
					</div>
					<div class="input-group">
						<label for="studyend">End date</label><br>
						<input id="studyend" name="studyend" type="date">
					</div>
					<div class="input-group input-group--description">
						<label for="edudescr">Description</label><br>
						<textarea id="edudescr" name="edudescr"></textarea>
					</div>
				</fieldset>
				<fieldset class="fieldset">
					<legend>Skills</legend>
					<div class="input-group">
						<label for="skill">Skill</label><br>
						<input id="skill" name="skill" type="text">
					</div>
					<div class="input-group">
						<label for="skilllevel">Level</label><br>
						<select id="skilllevel" name="skilllevel">
							<option value="" selected>--</option>
							<option value="master">Master</option>
							<option value="expert">Expert</option>
							<option value="advanced">Advanced</option>
							<option value="intermediate">Intermediate</option>
							<option value="beginner">Beginner</option>
						</select>
					</div>
				</fieldset>
				<fieldset class="fieldset fieldset--work">
					<legend>Work experience</legend>
					<div class="input-group input-group--job-title">
						<label for="job">Job Title</label><br>
						<input id="job" name="job" type="text">
					</div>
					<div class="input-group input-group--employer">
						<label for="employer">Employer</label><br>
						<input id="employer" name="employer" type="text">
					</div>
					<div class="input-group">
						<label for="jobstart">Start date</label><br>
						<input id="jobstart" name="jobstart" type="date">
					</div>
					<div class="input-group">
						<label for="jobend">End date</label><br>
						<input id="jobend" name="jobend" type="date">
					</div>
					<div class="input-group input-group--description">
						<label for="jobdescr">Description</label><br>
						<textarea id="jobdescr" name="jobdescr"></textarea>
					</div>
				</fieldset>
				<fieldset class="fieldset">
					<legend>Resume objective</legend>
					<div class="input-group input-group--description">
						<label for="resumedescr">Description</label><br>
						<textarea id="resumedescr" name="resumedescr"></textarea>
					</div>
				</fieldset>
				<fieldset class="fieldset">
					<legend>Interests</legend>
					<div class="input-group input-group--description">
						<label for="hobbydescr">Description</label><br>
						<textarea id="hobbydescr" name="hobbydescr"></textarea>
					</div>
				</fieldset>
				<fieldset class="fieldset fieldset--references">
					<legend>References</legend>
					<div class="input-group">
						<label for="companyname">Company Name</label><br>
						<input id="companyname" name="companyname" type="text">
					</div>
					<div class="input-group">
						<label for="contactperson">Contact Person</label><br>
						<input id="contactperson" name="contactperson" type="text">
					</div>
					<div class="input-group">
						<label for="contacttel">Phone Number</label><br>
						<input id="contacttel" name="contacttel" type="tel">
					</div>
					<div class="input-group">
						<label for="contactemail">Contact Email</label><br>
						<input id="contactemail" name="contactemail" type="email">
					</div>
				</fieldset>
				<button class="process-button process-button--previous" type="button">Prev Step</button>
				<button class="process-button process-button--next" type="button">Next Step</button>
			</form>
		</main>

	</body>
</html>
