<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="keywords" content="">
		<meta name="description" content="">
		<meta name="author" content="Vladislav Zharov">
		<meta name="theme-color" content="">
		
		<meta property="og:title" content="">
		<meta property="og:type" content="website">
		<meta property="og:image" content="">
		<meta property="og:url" content="">
		
		<title>CVGen - Experience</title>
		
		<link rel="stylesheet" type="text/css" href="./css/main.css">
	</head>
	<body>
		<header class="page-header">
			<a href="./index.html"><img src="./assets/images/logo.svg" width="90" height="25" alt="CVgenerator"></a>
			<nav>
				<ul>
					<li><a href="#">Contact</a></li>
				</ul>
			</nav>
		</header>
		<main class="page-main">
			<header class="main-header">
				<h1>My experiences</h1>
			</header>
			<button type="button" class="accordion">Education</button>
			<form action="">
				<fieldset>
					<legend>Education</legend>
					<label for="school">School</label>
					<input id="school" name="school" type="text">
					<label for="degree">Degree</label>
					<input id="degree" name="degree" type="text">
					<label for="studystart">Start date</label>
					<input id="studystart" name="studystart" type="date">
					<label for="studyend">End date</label>
					<input id="studyend" name="studyend" type="date">
					<textarea></textarea>
				</fieldset>
			</form>
			<button type="button" class="accordion">Skills</button>
			<form action="">
				<fieldset>
					<legend>Skills</legend>
					<label for="skill">Skill</label>
					<input id="skill" name="skill" type="text">
					<label for="skilllevel">Level</label>
					<select id="skilllevel" name="skilllevel">
						<option value="" selected>--</option>
						<option value="master">Master</option>
						<option value="expert">Expert</option>
						<option value="advanced">Advanced</option>
						<option value="intermediate">Intermediate</option>
						<option value="beginner">Beginner</option>
					</select>
				</fieldset>
			</form>
			<button type="button" class="accordion">Work experience</button>
			<form action="">
				<fieldset>
					<legend>Work</legend>
					<label for="job">Job Title</label>
					<input id="job" name="job" type="text">
					<label for="employer">Employer</label>
					<input id="employer" name="employer" type="text">
					<label for="jobstart">Start date</label>
					<input id="jobstart" name="jobstart" type="date">
					<label for="jobend">End date</label>
					<input id="jobend" name="jobend" type="date">
					<textarea></textarea>
				</fieldset>
			</form>
			<button type="button" class="accordion">Resume objective</button>
			<form action="">
				<fieldset>
					<legend>Description</legend>
					<textarea></textarea>
				</fieldset>
			</form>
			<button type="button" class="accordion">Interests</button>
			<form action="">
				<fieldset>
					<legend>Hobby</legend>
					<textarea></textarea>
				</fieldset>
			</form>
			<button type="button" class="accordion">References</button>
			<form action="">
				<fieldset>
					<legend>Reference</legend>
					<label for="companyname">Company Name</label>
					<input id="companyname" name="companyname" type="text">
					<label for="contactperson">Contact Person</label>
					<input id="contactperson" name="contactperson" type="text">
					<label for="contacttel">Phone Number</label>
					<input id="contacttel" name="contacttel" type="tel">
					<label for="contactemail">Contact Email</label>
					<input id="contactemail" name="contactemail" type="email">
				</fieldset>
			</form>
		</main>
		<footer class="page-footer">
			<ul>
				<li><a href="https://github.com/VZhHub/cv-generator.git" target="_blank" rel="noopener">GitHub Project</a></li>
			</ul>
			<address>
				<a href="mailto:zharov.vladislav.work@gmail.com">&#9993; zharov.vladislav.work@gmail.com</a>
			</address>
			<p>&copy; 2026 by Vladislav Zharov</p>
		</footer>
	</body>
</html>
