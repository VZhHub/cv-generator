<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="keywords" content="CV, curriculum vitae, generator, pdf">
		<meta name="description" content="CV generator">
		<meta name="author" content="Vladislav Zharov">
		
		<meta property="og:title" content="CV generator">
		<meta property="og:type" content="website">
		<meta property="og:image" content="https://vzhhub.github.io/cv-generator/og-image.png">
		<meta property="og:url" content="https://vzhhub.github.io/cv-generator/">
		<meta property="og:description" content="Create a professional CV easily in your browser">
		<meta property="og:site_name" content="CV generator">
		
		<title>CVgen - Output</title>
		
		<link rel="icon" type="image/png" href="./assets/icons/favicon/favicon-96x96.png" sizes="96x96">
		<link rel="icon" type="image/svg+xml" href="./assets/icons/favicon/favicon.svg">
		<link rel="icon" href="./assets/icons/favicon/favicon.ico">
		<link rel="apple-touch-icon" href="./assets/icons/favicon/apple-touch-icon.png" sizes="180x180">
		<meta name="apple-mobile-web-app-title" content="CV generator">
		<link rel="manifest" href="./assets/icons/favicon/site.webmanifest">
		
		<script type="module" src="/js/output.js"></script>
	</head>
	<body>
		<div class="page-backdrop"></div>
		<header class="page-header">
			<a href="./index.html"><img src="./assets/images/logo.svg" width="90" height="25" alt="CVgenerator"></a>
			<nav>
				<ul>
					<li><a href="#my-contact">Contact</a></li>
				</ul>
			</nav>
		</header>
		<main class="page-main">
			<header class="main-header">
				<div class="main-header__hgroup">
					<h1>All done!</h1>
					<p><em>You can now download your CV as a PDF.</em></p>
				</div>
				<button id="download-pdf" class="process-button" type="button">Download PDF</button>
			</header>
			<div class="cv-preview">
				<section class="personal">
					<header class="personal__header">
						<h2 class="personal__h2"></h2>
						<div class="personal__avatar-container"></div>
					</header>
					<section class="personal__personal">
						<h3 class="personal__h3">Personal</h3>
					</section>
					<section class="personal__interests">
						<h3 class="personal__h3">Interests</h3>
						<ul class="interest-list"></ul>
					</section>
				</section>
				<div class="experience">
					<section class="experience__section experience__section--education">
						<h3>Education</h3>
						<template id="education-template">
							<article class="experience__article">
								<h4 class="article__h4 article__h4--school"></h4>
								<p class="article__p--degree"></p>
								<p class="article__p--description"></p>
								<p class="article__p--time"><time class="start"></time> - <time class="end"></time></p>
							</article>
						</template>
					</section>
					<section class="experience__section experience__section--skills">
						<h3>Skills</h3>
						<template id="skills-template">
							<dt class="experience__dt"></dt>
							<dd class="experience__dd"></dd>
						</template>
					</section>
					<section class="experience__section experience__section--work">
						<h3>Work experience</h3>
						<template id="work-template">
							<article class="experience__article">
								<h4 class="article__h4 article__h4--position"></h4>
								<p class="article__p--company"></p>
								<p class="article__p--description"></p>
								<p class="article__p--time"><time class="start"></time> - <time class="end"></time></p>
							</article>
						</template>
					</section>
					<section class="experience__section experience__section--references">
						<h3>References</h3>
						<template id="references-template">
							<article class="experience__article">
								<h4 class="article__h4 article__h4--company"></h4>
								<p class="article__p article__p--person"></p>
								<p class="article__p article__p--tel"></p>
								<p class="article__p article__p--email"></p>
							</article>
						</template>
					</section>
					<section class="experience__section experience__section--resume">
						<h3>Resume</h3>
						<p></p>
					</section>
				</div>
			</div>
			<a class="process-button process-button--previous" href="./experience.html">Prev Step</a>
		</main>
		<footer id="my-contact" class="page-footer">
			<ul>
				<li><a href="https://github.com/VZhHub/cv-generator.git" target="_blank" rel="noopener">GitHub Project</a></li>
			</ul>
			<address>
				<a href="mailto:zharov.vladislav.work@gmail.com">&#9993; zharov.vladislav.work@gmail.com</a>
			</address>
			<p>&copy; 2026 by Vladislav Zharov</p>
		</footer>
	</body>
</html>
