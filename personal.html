<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">

		<meta name="description" content="">

		<meta name="theme-color" content="">

		<title>CVGen - Personal</title>
		
		<link rel="stylesheet" type="text/css" href="./css/main.css">
	</head>
	<body>
		<header class="page-header">
			<a href="./index.html"><img src="./assets/images/logo.svg" width="90" height="25" alt="CVgenerator"></a>
			<nav>
				<ul>
					<li><a href="#">Contact</a></li>
				</ul>
			</nav>
		</header>
		<main class="page-main">
			<header class="main-header">
				<h1>Personal details</h1>
			</header>
			<form action="" enctype="multipart/form-data">
				<fieldset>
					<legend>Main details</legend>
					<p>Fields marked with asterisks are required.</p>
					<div class="input-group input-group--photo">
						<label for="addphoto">
							<img src="./assets/images/photo.svg" width="100" height="100" alt="">
							<span>Add photo (optional)</span>
						</label>
						<input id="addphoto" type="file" accept="image/png, image/jpeg">
					</div>
					<div class="input-group">
						<label for="fname">First name*</label>
						<input id="fname" name="fname" type="text" required>
					</div>
					<div class="input-group">
						<label for="lname">Last name*</label>
						<input id="lname" name="lname" type="text" required>
					</div>
					<div class="input-group">
						<label for="email">Email address*</label>
						<input id="email" name="email" type="email" placeholder="e.g. contact@email.com" required>
					</div>
					<div class="input-group">
						<label for="tel">Phone number*</label>
						<input id="tel" name="tel" type="tel" required>
					</div>
					<div class="input-group">
						<label for="position">Target position*</label>
						<input id="position" name="position" type="text" required>
					</div>
					<div class="input-group">
						<label for="birthdate">Date of birth</label>
						<input id="birthdate" name="birthdate" type="date">
					</div>
				</fieldset>
				<fieldset>
					<legend>Address</legend>
					<p>Fill this part only if needed.</p>
					<label for="state">State</label>
					<input id="state" name="state" type="text">
					<label for="city">City</label>
					<input id="city" name="city" type="text">
					<label for="street">Street</label>
					<input id="street" name="street" type="text">
					<label for="streetnum">Street number</label>
					<input id="streetnum" name="streetnum" type="text">
					<label for="zip">Zip code</label>
					<input id="zip" name="zip" type="text">
				</fieldset>
				<fieldset>
					<legend>Additional details</legend>
					<p>Fill this part only if needed.</p>
					<label for="driving">Driving license</label>
					<input id="driving" name="driving" type="text">
					<label for="linkedin">LinkedIn</label>
					<input id="linkedin" name="linkedin" type="url">
					<label for="website">Website</label>
					<input id="website" name="website" type="url">
					<input id="relocation" name="relocation" value="yes" type="checkbox">
					<label for="relocation">Open to relocation</label>
				</fieldset>
				<input type="submit" value="Next Step">
			</form>
		</main>
		<footer class="page-footer">
			<ul>
				<li><a href="https://github.com/VZhHub/cv-generator.git" target="_blank" rel="noopener">GitHub Project</a></li>
			</ul>
			<address>
				<a href="mailto:zharov.vladislav.work@gmail.com">&#9993; zharov.vladislav.work@gmail.com</a>
			</address>
			<p>&copy; 2026 by Vladislav Zharov</p>
		</footer>
	</body>
</html>
