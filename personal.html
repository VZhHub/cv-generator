		<link rel="icon" type="image/svg+xml" href="/cv-generator/assets/favicon-BaJ6yShC.svg">
		<link rel="icon" href="/cv-generator/assets/favicon-CMP45d23.ico">
		<link rel="apple-touch-icon" href="/cv-generator/assets/apple-touch-icon-eL3wGN_I.png" sizes="180x180">

		<script type="module" crossorigin src="/cv-generator/assets/personal-Cj--ZSIF.js"></script>
		<link rel="modulepreload" crossorigin href="/cv-generator/assets/page-backdrop-DZtncMtN.js">
		<link rel="modulepreload" crossorigin href="/cv-generator/assets/get-data-CimAuLK4.js">
		<link rel="stylesheet" crossorigin href="/cv-generator/assets/page-backdrop-D-HcE1uL.css">
		<link rel="stylesheet" crossorigin href="/cv-generator/assets/get-data-BcIlvo6X.css">
		<link rel="stylesheet" crossorigin href="/cv-generator/assets/personal-csKDrVZy.css">
	</head>
	<body>
		<div class="page-backdrop"></div>
		<header class="page-header">
			<a href="./index.html"><img src="/cv-generator/assets/logo-BlCEUl7J.svg" width="90" height="25" alt="CVgenerator"></a>
			<nav>
				<ul>
					<li><a href="#my-contact">Contact</a></li>
				</ul>
			</nav>
		</header>
		<main class="page-main">
			<header class="main-header">
				<div class="main-header__hgroup">
					<h1>Personal details</h1>
					<p><em>Only fields marked with asterisks are required.</em></p>
				</div>
			</header>
			<form action="" enctype="multipart/form-data" data-form="personal" data-next-page="./experience.html">
				<fieldset class="fieldset fieldset--main">
					<legend>Main details</legend>
					<div class="input-group input-group--photo">
						<input id="add-photo" class="visually-hidden" type="file" accept="image/png, image/jpeg">
						<label class="photo-label" for="add-photo">
							<img class="photo-label__default-img" src="data:image/svg+xml,%3c?xml%20version='1.0'%20encoding='utf-8'?%3e%3c!--%20Uploaded%20to:%20SVG%20Repo,%20www.svgrepo.com,%20Generator:%20SVG%20Repo%20Mixer%20Tools%20--%3e%3csvg%20width='800px'%20height='800px'%20viewBox='0%200%2024%2024'%20fill='none'%20xmlns='http://www.w3.org/2000/svg'%3e%3cpath%20fill-rule='evenodd'%20clip-rule='evenodd'%20d='M12%2018C14.7614%2018%2017%2015.7614%2017%2013C17%2010.2386%2014.7614%208%2012%208C9.23858%208%207%2010.2386%207%2013C7%2015.7614%209.23858%2018%2012%2018ZM12%2016.0071C10.3392%2016.0071%208.9929%2014.6608%208.9929%2013C8.9929%2011.3392%2010.3392%209.9929%2012%209.9929C13.6608%209.9929%2015.0071%2011.3392%2015.0071%2013C15.0071%2014.6608%2013.6608%2016.0071%2012%2016.0071Z'%20fill='%230F0F0F'/%3e%3cpath%20fill-rule='evenodd'%20clip-rule='evenodd'%20d='M9.56155%202C8.18495%202%206.985%202.93689%206.65112%204.27239L6.21922%206H4C2.34315%206%201%207.34315%201%209V19C1%2020.6569%202.34315%2022%204%2022H20C21.6569%2022%2023%2020.6569%2023%2019V9C23%207.34315%2021.6569%206%2020%206H17.7808L17.3489%204.27239C17.015%202.93689%2015.8151%202%2014.4384%202H9.56155ZM8.59141%204.75746C8.7027%204.3123%209.10268%204%209.56155%204H14.4384C14.8973%204%2015.2973%204.3123%2015.4086%204.75746L15.8405%206.48507C16.0631%207.37541%2016.863%208%2017.7808%208H20C20.5523%208%2021%208.44772%2021%209V19C21%2019.5523%2020.5523%2020%2020%2020H4C3.44772%2020%203%2019.5523%203%2019V9C3%208.44772%203.44772%208%204%208H6.21922C7.13696%208%207.93692%207.37541%208.15951%206.48507L8.59141%204.75746Z'%20fill='%230F0F0F'/%3e%3c/svg%3e" width="50" height="50" alt="">
							<img class="photo-label__uploaded-img hidden" alt="Uploaded photo">
							<span class="photo-label__text">Add photo (optional)</span>
						</label>
						<button class="input-group__delete-photo hidden" type="button">Delete photo</button>
					</div>
					<div class="input-group">
						<label for="fname">First name*</label>
						<input id="fname" name="fname" type="text" required>
					</div>
					<div class="input-group">
						<label for="lname">Last name*</label>
						<input id="lname" name="lname" type="text" required>
					</div>
					<div class="input-group input-group--email">
						<label for="email">Email address*</label>
						<input id="email" name="email" type="email" required>
					</div>
					<div class="input-group input-group--tel">
						<label for="tel">Phone number*</label>
						<input id="tel" name="tel" type="tel" required>
					</div>
					<div class="input-group input-group--birthday">
						<label for="birthday">Date of birth</label>
						<input id="birthday" name="birthday" type="date">
					</div>
					<div class="overlay hidden">
						<section class="adjust-photo">
							<h2>Adjust your photo</h2>
							<button class="adjust-photo__close" type="button" aria-label="Close">
								<svg fill="none" xmlns="http://www.w3.org/2000/svg" viewBox="3.03 3.03 18.02 18.02">
									<path d="M20.7457 3.32851C20.3552 2.93798 19.722 2.93798 19.3315 3.32851L12.0371 10.6229L4.74275 3.32851C4.35223 2.93798 3.71906 2.93798 3.32854 3.32851C2.93801 3.71903 2.93801 4.3522 3.32854 4.74272L10.6229 12.0371L3.32856 19.3314C2.93803 19.722 2.93803 20.3551 3.32856 20.7457C3.71908 21.1362 4.35225 21.1362 4.74277 20.7457L12.0371 13.4513L19.3315 20.7457C19.722 21.1362 20.3552 21.1362 20.7457 20.7457C21.1362 20.3551 21.1362 19.722 20.7457 19.3315L13.4513 12.0371L20.7457 4.74272C21.1362 4.3522 21.1362 3.71903 20.7457 3.32851Z" fill="#fff"/>
								</svg>
							</button>
							<div class="adjust-photo__div">
								<img class="adjust-photo__img" alt="User photo for cropping" draggable="false">
							</div>
							<div class="adjust-photo__controls">
								<div class="input-group input-group--zoom">
									<input id="zoom" type="range" value="0" autocomplete="off">
									<label for="zoom">Zoom</label>
								</div>
								<button class="adjust-photo__rotate" type="button">
									<img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='80'%20height='80'%20viewBox='0%200%2024%2024'%20fill='none'%20xmlns:v='https://vecta.io/nano'%3e%3cpath%20d='M20.49%2014.991a9%209%200%200%201-9.006%205.994%209%209%200%200%201-8.259-6.988%209%209%200%200%201%204.422-9.874%209%209%200%200%201%205.609-1.036C16.517%203.547%2018.673%205.911%2021%208m0%200V2m0%206h-6'%20stroke='%23000'%20stroke-width='1.5'%20stroke-linecap='round'%20stroke-linejoin='round'/%3e%3c/svg%3e" alt="" width="30" height="30">Rotate
								</button>
								<button class="adjust-photo__save process-button" type="button">Save</button>
							</div>
						</section>
					</div>
				</fieldset>
				<fieldset class="fieldset fieldset--address">
					<legend>Address</legend>
					<div class="input-group">
						<label for="state">State</label>
						<input id="state" name="state" type="text">
					</div>
					<div class="input-group">
						<label for="city">City</label>
						<input id="city" name="city" type="text">
					</div>
					<div class="input-group">
						<label for="street">Street, street number</label>
						<input id="street" name="street" type="text">
					</div>
					<div class="input-group">
						<label for="zip">Zip code</label>
						<input id="zip" name="zip" type="text">
					</div>
				</fieldset>
				<fieldset class="fieldset fieldset--additional">
					<legend>Additional details</legend>
					<div class="input-group">
						<label for="driving">Driving license</label>
						<input id="driving" name="driving" type="text">
					</div>
					<div class="input-group">
						<label for="linkedin">LinkedIn</label>
						<input id="linkedin" name="linkedin" type="text">
					</div>
					<div class="input-group">
						<label for="website">Website</label>
						<input id="website" name="website" type="text">
					</div>
					<div class="input-group input-group--relocation">
						<label for="relocation">Open to relocation</label>
						<input id="relocation" name="relocation" value="Yes" type="checkbox">
					</div>
				</fieldset>
				<button class="process-button process-button--next" type="submit">Next Step</button>
			</form>
		</main>

			<ul>
				<li><a href="https://github.com/VZhHub/cv-generator.git" target="_blank" rel="noopener">GitHub Project</a></li>

		</footer>
	</body>
</html>
