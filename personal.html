<html lang="en">
	<head>
		<meta charset="utf-8">

		<title>CVGen - Personal</title>
		
		<!--<link rel="stylesheet" type="text/css" href="./css/main.css">-->
		<link rel="stylesheet" type="text/css" href="./css/reset.css">
		<link rel="stylesheet" type="text/css" href="./css/base.css">
		<link rel="stylesheet" type="text/css" href="./css/layout.css">
		<link rel="stylesheet" type="text/css" href="./css/utils.css">
		<link rel="stylesheet" type="text/css" href="./css/typography.css">
		<link rel="stylesheet" type="text/css" href="./css/components/form.css">
		<link rel="stylesheet" type="text/css" href="./css/components/photo-button.css">
		<link rel="stylesheet" type="text/css" href="./css/components/process-button.css">
		<link rel="stylesheet" type="text/css" href="./css/components/page-backdrop.css">
	</head>
	<body>
		<div class="page-backdrop"></div>
		<header class="page-header">
			<a href="./index.html"><img src="./assets/images/logo.svg" width="90" height="25" alt="CVgenerator"></a>
			<nav>
				<ul>
					<li><a href="#my-contact">Contact</a></li>
				</ul>
			</nav>
		</header>
		<main class="page-main">
			<header class="main-header">
				<hgroup class="main-header__hgroup">
					<h1>Personal details</h1>
					<p><em>Only fields marked with asterisks are required.</em></p>
				</hgroup>
			</header>
			<form action="" enctype="multipart/form-data">
				<fieldset class="fieldset fieldset--main">
					<legend>Main details</legend>
					<div class="input-group input-group--photo">
						<input id="addphoto" class="visually-hidden" type="file" accept="image/png, image/jpeg">
						<label for="addphoto">
							<img src="./assets/images/photo.svg" width="50" height="50" alt="">
							<span>Add photo (optional)</span>
						</label>
					</div>
					<div class="input-group">
						<label for="fname">First name*</label><br>
						<input id="fname" name="fname" type="text" required>
					</div>
					<div class="input-group">
						<label for="lname">Last name*</label><br>
						<input id="lname" name="lname" type="text" required>
					</div>
					<div class="input-group input-group--email">
						<label for="email">Email address*</label><br>
						<input id="email" name="email" type="email" required>
					</div>
					<div class="input-group input-group--target-position">
						<label for="position">Target position*</label><br>
						<input id="position" name="position" type="text" required>
					</div>
					<div class="input-group input-group--tel">
						<label for="tel">Phone number</label><br>
						<input id="tel" name="tel" type="tel">
					</div>
					<div class="input-group">
						<label for="birthdate">Date of birth</label><br>
						<input id="birthdate" name="birthdate" type="date">
					</div>
				</fieldset>
				<fieldset class="fieldset fieldset--address">
					<legend>Address</legend>
					<div class="input-group">
						<label for="state">State</label><br>
						<input id="state" name="state" type="text">
					</div>
					<div class="input-group">
						<label for="city">City</label><br>
						<input id="city" name="city" type="text">
					</div>
					<div class="input-group">
						<label for="street">Street</label><br>
						<input id="street" name="street" type="text">
					</div>
					<div class="input-group">
						<label for="streetnum">Street number</label><br>
						<input id="streetnum" name="streetnum" type="text">
					</div>
					<div class="input-group">
						<label for="zip">Zip code</label><br>
						<input id="zip" name="zip" type="text">
					</div>
				</fieldset>
				<fieldset class="fieldset fieldset--additional">
					<legend>Additional details</legend>
					<div class="input-group">
						<label for="driving">Driving license</label><br>
						<input id="driving" name="driving" type="text">
					</div>
					<div class="input-group">
						<label for="linkedin">LinkedIn</label><br>
						<input id="linkedin" name="linkedin" type="url">
					</div>
					<div class="input-group">
						<label for="website">Website</label><br>
						<input id="website" name="website" type="url">
					</div>
					<div class="input-group input-group--relocation">
						<label for="relocation">Open to relocation</label>
						<input id="relocation" name="relocation" value="yes" type="checkbox">
					</div>
				</fieldset>
				<button class="process-button process-button--next" type="button">Next Step</button>
			</form>
		</main>
		<footer id="my-contact" class="page-footer">
			<ul>
				<li><a href="https://github.com/VZhHub/cv-generator.git" target="_blank" rel="noopener">GitHub Project</a></li>
			</ul>
			<address>
				<a href="mailto:zharov.vladislav.work@gmail.com">&#9993; zharov.vladislav.work@gmail.com</a>
			</address>
			<p>&copy; 2026 by Vladislav Zharov</p>
		</footer>
	</body>
</html>
